name: Pipeline Report

on:
  schedule:
    - cron: '0 2 1 * *'  # раз в месяц, 1-го числа в 02:00 UTC
  workflow_dispatch:

jobs:
  pipeline-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full pipeline (with Reporter)
        run: |
          python pipeline.py

      - name: Commit pipeline report if any
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add sources_meta/pipeline_report.md
          if git diff --cached --quiet; then
            echo "No pipeline_report changes to commit"
            exit 0
          fi
          git commit -m "Auto-update pipeline report"

      - name: Push
        run: |
          git push origin HEAD:main
